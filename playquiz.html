        <script>
function RewardAd() {
  if (typeof adBreak !== "function") {
    alert("Ad not ready");
    return;
  }

  adBreak({
    type: "reward",
    name: "reward-coin",

    beforeReward: (showAdFn) => {
      showAdFn(); // ad start
    },

    adViewed: () => {
      console.log("Reward mil gaya");

      // 👉 Yaha reward do
      showToast({
        title: "Success!",
        msg: "100 coins added!"
      });

      // example:
      // user.coins += 100;
    },

    adDismissed: () => {
      console.log("User ne ad close kiya");

      showToast({
        title: "Oops!",
        msg: "Ad complete nahi hua 😢"
      });
    }
  });
}
</script>
